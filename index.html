<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Absensi Training PTO</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">

<!-- HEADER -->
<header class="bg-indigo-600 text-white py-4 shadow-lg">
  <div class="max-w-3xl mx-auto px-6 flex justify-between items-center">
    <h1 class="text-lg md:text-xl font-bold">
      Sistem Absensi Training
    </h1>

    <!-- Tombol Admin -->
    <a href="admin.html"
       class="bg-white text-indigo-600 text-sm px-4 py-1 rounded-lg hover:bg-gray-100 transition">
       Admin
    </a>
  </div>
</header>

<div class="max-w-3xl mx-auto p-6">

<div class="bg-white shadow-xl rounded-2xl p-8 mt-6">

<h2 class="text-xl font-bold mb-6">Form Absensi Training</h2>

<form id="attendanceForm" class="space-y-4">

<input type="text" id="nip" placeholder="NIP"
class="w-full border p-3 rounded-xl" required>

<input type="text" id="nama" placeholder="Nama"
class="w-full border p-3 rounded-xl" required>

<input type="text" id="subDivisi" placeholder="Sub Divisi"
class="w-full border p-3 rounded-xl" required>

<input type="text" id="departemen" placeholder="Departemen"
class="w-full border p-3 rounded-xl" required>

<select id="jenisPelatihan"
class="w-full border p-3 rounded-xl" required>
<option value="">Pilih Program</option>
<option value="BASIC">BASIC</option>
<option value="MULTISKILL">MULTISKILL</option>
</select>

<input type="text" id="batchPTO" placeholder="Batch PTO"
class="w-full border p-3 rounded-xl" required>

<select id="kehadiran"
class="w-full border p-3 rounded-xl" required>
<option value="">Pilih Kehadiran</option>
<option>Hadir</option>
<option>Sakit</option>
<option>Tidak Hadir</option>
</select>

<select id="namaMateri"
class="w-full border p-3 rounded-xl" required>
<option value="">Memuat materi...</option>
</select>

<input type="date" id="tanggal"
class="w-full border p-3 rounded-xl" required>

<!-- SIGNATURE -->
<div>
<label class="block mb-2 font-semibold">Tanda Tangan</label>
<canvas id="signaturePad"
width="600" height="200"
class="w-full border rounded-xl bg-gray-50"></canvas>
<button type="button" onclick="clearSignature()"
class="text-red-600 text-sm mt-2">Hapus</button>
</div>

<button type="submit"
class="w-full bg-indigo-600 text-white py-3 rounded-xl hover:bg-indigo-700 transition">
Submit
</button>

</form>
</div>
</div>
