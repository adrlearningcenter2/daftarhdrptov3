<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Absensi Training PTO</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">

<div class="max-w-3xl mx-auto p-6">

<div class="bg-white shadow-xl rounded-2xl p-8 mt-6">

<h2 class="text-xl font-bold mb-6">Form Absensi Training</h2>

<form id="attendanceForm" class="space-y-4">

<input type="text" id="nip" placeholder="NIP"
class="w-full border p-3 rounded-xl" required>

<input type="text" id="nama" placeholder="Nama"
class="w-full border p-3 rounded-xl" required>

<input type="text" id="subDivisi" placeholder="Sub Divisi"
class="w-full border p-3 rounded-xl" required>

<input type="text" id="departemen" placeholder="Departemen"
class="w-full border p-3 rounded-xl" required>

<select id="jenisPelatihan"
class="w-full border p-3 rounded-xl" required>
<option value="">Pilih Program</option>
<option value="BASIC">BASIC</option>
<option value="MULTISKILL">MULTISKILL</option>
</select>

<input type="text" id="batchPTO" placeholder="Batch PTO"
class="w-full border p-3 rounded-xl" required>

<select id="kehadiran"
class="w-full border p-3 rounded-xl" required>
<option value="">Pilih Kehadiran</option>
<option>Hadir</option>
<option>Sakit</option>
<option>Tidak Hadir</option>
</select>

<select id="namaMateri"
class="w-full border p-3 rounded-xl" required>
<option value="">Memuat materi...</option>
</select>

<input type="date" id="tanggal"
class="w-full border p-3 rounded-xl" required>

<!-- SIGNATURE -->
<div>
<label class="block mb-2 font-semibold">Tanda Tangan</label>
<canvas id="signaturePad"
width="600" height="200"
class="w-full border rounded-xl bg-gray-50"></canvas>
<button type="button" onclick="clearSignature()"
class="text-red-600 text-sm mt-2">Hapus</button>
</div>

<button type="submit"
class="w-full bg-indigo-600 text-white py-3 rounded-xl">
Submit
</button>

</form>
</div>
</div>

<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzfHpLuotloCY_OFJKAJ2NSB_gTKjVZCia1Sovq1kd-OjXeMoaWcrypUWifhdpf5alX/exec";

/* =========================
   LOAD MATERI
========================= */

function loadMateri(){
fetch(WEB_APP_URL + "?action=getMateri")
.then(res => res.json())
.then(data=>{
const select = document.getElementById("namaMateri");
select.innerHTML = '<option value="">Pilih Materi</option>';
data.forEach(m=>{
const opt=document.createElement("option");
opt.value=m;
opt.textContent=m;
select.appendChild(opt);
});
});
}
loadMateri();

/* =========================
   AUTO READ MASTER
========================= */

document.getElementById("nip").addEventListener("blur",function(){

const nip=this.value.trim();
if(!nip) return;

fetch(WEB_APP_URL + "?action=getKaryawan&nip="+encodeURIComponent(nip))
.then(res=>res.json())
.then(data=>{

if(data.status==="success"){
document.getElementById("nama").value=data.nama||"";
document.getElementById("subDivisi").value=data.subDivisi||"";
document.getElementById("departemen").value=data.departemen||"";
}else{
document.getElementById("subDivisi").value="";
document.getElementById("departemen").value="";
}

});
});

/* =========================
   SIGNATURE
========================= */

const canvas=document.getElementById("signaturePad");
const ctx=canvas.getContext("2d");
let drawing=false;

canvas.addEventListener("mousedown",()=>{drawing=true;ctx.beginPath();});
canvas.addEventListener("mouseup",()=>drawing=false);
canvas.addEventListener("mousemove",draw);

canvas.addEventListener("touchstart",()=>{drawing=true;ctx.beginPath();});
canvas.addEventListener("touchend",()=>drawing=false);
canvas.addEventListener("touchmove",draw);

function draw(e){
if(!drawing)return;
e.preventDefault();
const rect=canvas.getBoundingClientRect();
const x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
const y=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;
ctx.lineWidth=2;
ctx.lineCap="round";
ctx.lineTo(x,y);
ctx.stroke();
}

function clearSignature(){
ctx.clearRect(0,0,canvas.width,canvas.height);
}

/* =========================
   SUBMIT
========================= */

document.getElementById("attendanceForm")
.addEventListener("submit",function(e){

e.preventDefault();

if(canvas.toDataURL().length<200){
alert("Tanda tangan wajib diisi");
return;
}

const formData=new URLSearchParams();

formData.append("nip",nip.value);
formData.append("nama",nama.value);
formData.append("subDivisi",subDivisi.value);
formData.append("departemen",departemen.value);
formData.append("jenisPelatihan",jenisPelatihan.value);
formData.append("batchPTO",batchPTO.value);
formData.append("kehadiran",kehadiran.value);
formData.append("namaMateri",namaMateri.value);
formData.append("tanggal",tanggal.value);
formData.append("signature",canvas.toDataURL());

fetch(WEB_APP_URL,{method:"POST",body:formData})
.then(res=>res.json())
.then(r=>{
if(r.status==="success"){
alert("Berhasil disimpan");
attendanceForm.reset();
clearSignature();
}else{
alert(r.message);
}
});

});

</script>
</body>
</html>
